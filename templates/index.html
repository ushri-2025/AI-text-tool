<!DOCTYPE html>
<html>
<head>
<title>AI Text Tool</title>

<style>
body {
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 20px;
    width: 65%;
    color: white;
}

textarea {
    width: 100%;
    height: 140px;
    border-radius: 10px;
    padding: 10px;
    border: none;
}

select, button {
    margin-top: 10px;
    padding: 8px;
    border-radius: 8px;
    border: none;
}

button {
    background: #4CAF50;
    color: white;
    cursor: pointer;
}

button:disabled {
    background: grey;
}

#output {
    margin-top: 20px;
    background: rgba(255,255,255,0.15);
    padding: 15px;
    border-radius: 10px;
    color: white;
    white-space: pre-wrap;
    line-height: 1.6;
}

.loader {
    border: 4px solid rgba(255,255,255,0.2);
    border-top: 4px solid white;
    border-radius: 50%;
    width: 25px;
    height: 25px;
    animation: spin 1s linear infinite;
    margin: 10px auto;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">

<h2>✨ AI Text Tool</h2>

<textarea id="inputText" placeholder="Enter text or topic..."></textarea>

<select id="mode">
    <option value="correct">Autocorrect</option>
    <option value="improve">Improve</option>
    <option value="humanize">Humanize</option>
    <option value="write">Write Text</option>
</select>

<select id="style" style="display:none;">
    <option value="formal">Formal</option>
    <option value="casual">Casual</option>
    <option value="technical">Technical</option>
</select>

<br>

<button id="submitBtn" onclick="processText(0)">Process</button>
<button onclick="retryText()">Retry</button>
<button onclick="clearText()">Clear</button>

<div id="loading" style="display:none;">
    <div class="loader"></div>
</div>

<div id="output"></div>

</div>

<script>

let retryCount = 0;
let lastText = "";

document.getElementById("mode").addEventListener("change", function() {
    const mode = this.value;

    document.getElementById("style").style.display =
        (mode === "improve") ? "inline-block" : "none";
});


async function processText(retryFlag) {
    const text = document.getElementById("inputText").value;
    const mode = document.getElementById("mode").value;
    const style = document.getElementById("style").value;

    if (!text.trim()) return;

    if (retryFlag === 0) {
        retryCount = 0;
        lastText = text;
    }

    const btn = document.getElementById("submitBtn");

    btn.disabled = true;
    btn.innerText = "Processing...";

    document.getElementById("loading").style.display = "block";

    const res = await fetch("/process", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            text: lastText,
            mode,
            style,
            retry: retryCount
        })
    });

    const data = await res.json();

    document.getElementById("output").innerHTML =
        "<b>Result:</b><br><br>" + data.result;

    btn.disabled = false;
    btn.innerText = "Process";

    document.getElementById("loading").style.display = "none";
}


function retryText() {
    retryCount++;
    processText(1);
}


function clearText() {
    document.getElementById("inputText").value = "";
    document.getElementById("output").innerHTML = "";
}

</script>

</body>
</html>
