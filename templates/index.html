<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Text Tool</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    text-align: center;
}

.container {
    width: 80%;
    margin: auto;
    margin-top: 40px;
}

textarea {
    width: 100%;
    height: 120px;
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.output {
    margin-top: 20px;
    padding: 15px;
    background: #eaeaea;
    border-radius: 8px;
    text-align: left;
    min-height: 100px;
    white-space: pre-wrap;
}

button {
    padding: 10px 16px;
    margin: 8px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
}

.mode-btn {
    background: #ddd;
}

.active {
    background: #4CAF50;
    color: white;
}

.tone-btn {
    background: #ddd;
}

.tone-active {
    background: orange;
    color: white;
}

.action-btn {
    background: #4CAF50;
    color: white;
}

.copy-btn {
    position: absolute;
    right: 10px;
    top: 10px;
    background: #ccc;
}

.box {
    position: relative;
}

.gmail-btn {
    background: #d14836;
    color: white;
}
</style>

</head>
<body>

<div class="container">

<h2>AI Text Tool</h2>

<div class="box">
<textarea id="inputText" placeholder="Enter your text here..."></textarea>
<button class="copy-btn" onclick="copyText('inputText')">📋</button>
</div>

<div>
<button class="mode-btn active" onclick="selectMode('autocorrect', this)">Autocorrect</button>
<button class="mode-btn" onclick="selectMode('improve', this)">Improve</button>
<button class="mode-btn" onclick="selectMode('humanize', this)">Humanize</button>
<button class="mode-btn" onclick="selectMode('write', this)">Write</button>
</div>

<div id="toneOptions" style="display:none;">
<button class="tone-btn tone-active" onclick="selectTone('formal', this)">Formal</button>
<button class="tone-btn" onclick="selectTone('casual', this)">Casual</button>
<button class="tone-btn" onclick="selectTone('technical', this)">Technical</button>
</div>

<div>
<button class="action-btn" onclick="processText()">Process</button>
<button class="action-btn" onclick="retryText()">Retry</button>
<button class="action-btn" onclick="clearText()">Clear</button>
<button id="gmailBtn" class="gmail-btn" style="display:none;" onclick="openGmail()">📧 Gmail</button>
</div>

<div class="box">
<div id="outputText" class="output"></div>
<button class="copy-btn" onclick="copyText('outputText')">📋</button>
</div>

</div>

<script>
let mode = "autocorrect";
let tone = "formal";
let variation = 0;

function selectMode(selectedMode, btn) {
    mode = selectedMode;

    document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    if (mode === "improve") {
        document.getElementById("toneOptions").style.display = "block";
    } else {
        document.getElementById("toneOptions").style.display = "none";
    }
}

function selectTone(selectedTone, btn) {
    tone = selectedTone;

    document.querySelectorAll(".tone-btn").forEach(b => b.classList.remove("tone-active"));
    btn.classList.add("tone-active");
}

function processText() {
    variation = 0;
    sendRequest();
}

function retryText() {
    variation = 1;
    sendRequest();
}

function sendRequest() {
    let text = document.getElementById("inputText").value;

    fetch("/process", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            text: text,
            mode: mode,
            tone: tone,
            variation: variation
        })
    })
    .then(res => res.json())
    .then(data => {
        typeEffect(data.result);

        if (mode === "write" && text.toLowerCase().includes("email")) {
            document.getElementById("gmailBtn").style.display = "inline-block";
        } else {
            document.getElementById("gmailBtn").style.display = "none";
        }
    });
}

function typeEffect(text) {
    let i = 0;
    let output = document.getElementById("outputText");
    output.innerHTML = "";

    function typing() {
        if (i < text.length) {
            output.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 10);
        }
    }
    typing();
}

function clearText() {
    document.getElementById("inputText").value = "";
    document.getElementById("outputText").innerHTML = "";
}

function copyText(id) {
    let text = document.getElementById(id).innerText || document.getElementById(id).value;
    navigator.clipboard.writeText(text);
}

function openGmail() {
    let body = document.getElementById("outputText").innerText;
    window.open("https://mail.google.com/mail/?view=cm&fs=1&body=" + encodeURIComponent(body));
}
</script>

</body>
</html>
